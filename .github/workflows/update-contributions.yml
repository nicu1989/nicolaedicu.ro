name: Update contribution pages

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate contribution pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python docs/scripts/update_github_contributions.py

      - name: Commit updated pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update open source contribution pages"
          file_pattern: docs/source/projects/eclipse-score.rst docs/source/projects/nrfconnect.rst docs/source/projects/other-open-source.rst

      - name: Build site
        run: make -C docs html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
